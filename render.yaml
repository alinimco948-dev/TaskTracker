services:
  - type: web
    name: tasktracker
    runtime: docker
    repo: https://github.com/alinimco948-dev/TaskTracker
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: 8080

databases:
  - name: tasktracker-db
    databaseName: tasktracker
    user: tasktracker_user
    plan: free